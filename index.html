<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع كشف النصابين</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 12px; margin: 15px auto; width: 100%; max-width: 400px; box-sizing: border-box; }
        input, textarea, button { width: 100%; margin: 8px 0; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        button { cursor: pointer; color: white; background: #28a745; font-weight: bold; }
        .footer { font-size: 12px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="footer">تم التصميم بواسطة بنات الاردن بزنس ©</div>
    <h1>🔍 موقع كشف</h1>

    <button onclick="showReports()" style="background:#ffc107; color:#000; width:100%; max-width:400px; padding:12px; border-radius:8px; border:none;">عرض البلاغات الموثقة</button>
    <div id="reports-list" class="box" style="display:none; text-align:right;"></div>

    <div class="box">
        <h3>البحث</h3>
        <input type="text" id="searchPhone" placeholder="أدخل رقم الهاتف">
        <button onclick="searchData()">بحث</button>
        <div id="result"></div>
    </div>

    <div class="box">
        <h3>تقديم بلاغ</h3>
        <input type="text" id="name" placeholder="اسم النصاب">
        <input type="text" id="phone" placeholder="رقم النصاب">
        <textarea id="notes" placeholder="تفاصيل النصب..."></textarea>
        <button onclick="saveData()" style="background:#007bff;">إرسال للمراجعة</button>
    </div>

    <div class="box">
        <h3 id="admin-toggle" onclick="toggleAdmin()" style="cursor:pointer; color:#dc3545;">🔑 اضغط هنا لدخول الأدمن</h3>
        <div id="admin-panel" style="display:none;">
            <input type="text" id="adminUser" placeholder="اسم المستخدم">
            <input type="password" id="adminPass" placeholder="كلمة السر">
            <button onclick="checkAdmin()" style="background:#dc3545;">دخول</button>
        </div>
    </div>

    <script>
        // الكود البرمجي مدمج هنا لضمان عمله
        function saveData() {
            let reports = JSON.parse(localStorage.getItem('allReports') || "[]");
            reports.push({ name: document.getElementById('name').value, phone: document.getElementById('phone').value, notes: document.getElementById('notes').value, status: 'pending' });
            localStorage.setItem('allReports', JSON.stringify(reports));
            alert("تم الإرسال للمراجعة!");
        }

        function searchData() {
            let phone = document.getElementById('searchPhone').value;
            let reports = JSON.parse(localStorage.getItem('allReports') || "[]");
            let res = reports.find(r => r.phone === phone && r.status === 'approved');
            if (res) { document.getElementById('result').innerHTML = `<p style="color:#28a745;">تم العثور: ${res.name} - ${res.notes}</p>`; }
            else { alert("لا يوجد بلاغ موثق لهذا الرقم."); }
        }

        function toggleAdmin() {
            let panel = document.getElementById('admin-panel');
            panel.style.display = (panel.style.display === "none") ? "block" : "none";
        }

        function checkAdmin() {
            if (document.getElementById('adminUser').value === "oday" && document.getElementById('adminPass').value === "oday1996oday") {
                localStorage.setItem('isAdmin', 'true');
                alert("تم دخول لوحة التحكم");
            } else { alert("خطأ في البيانات"); }
        }

        function showReports() {
            let isAdmin = localStorage.getItem('isAdmin') === 'true';
            document.getElementById('reports-list').style.display = 'block';
            let reports = JSON.parse(localStorage.getItem('allReports') || "[]");
            document.getElementById('reports-list').innerHTML = reports.map((r, i) => {
                if (!isAdmin && r.status !== 'approved') return "";
                return `<div style="border-bottom:1px solid #444; padding:10px;">${r.name} (${r.status}) ${isAdmin && r.status==='pending' ? `<button onclick="approve(${i})" style="padding:5px; background:green;">موافقة</button>` : ''}</div>`;
            }).join('');
        }

        function approve(i) {
            let r = JSON.parse(localStorage.getItem('allReports'));
            r[i].status = 'approved';
            localStorage.setItem('allReports', JSON.stringify(r));
            showReports();
        }
    </script>
</body>
</html>
