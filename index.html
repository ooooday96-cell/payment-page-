<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع كشف النصابين</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🔍 موقع كشف</h1>
        <p>موقع مخصص لكشف الاحتيال. إذا تعرضت للنصب، اكتب التفاصيل ليحذر الآخرون.</p>
    </header>

    <div class="container">
        <!-- البحث -->
        <div class="box">
            <h3>البحث عن نصاب</h3>
            <input type="text" id="searchPhone" placeholder="أدخل رقم الهاتف للبحث">
            <button onclick="searchData()" style="background:#28a745;">بحث الآن</button>
            <div id="result" style="margin-top:20px;"></div>
        </div>

        <!-- عرض البلاغات -->
        <button onclick="showReports()" style="background:#ffc107; color:#000; width:90%; max-width:400px; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;">عرض جميع البلاغات</button>
        <div id="reports-list" style="display:none;" class="box">
            <h3>قائمة البلاغات</h3>
            <div id="all-reports"></div>
            <button onclick="document.getElementById('reports-list').style.display='none'">إغلاق</button>
        </div>

        <!-- الإضافة -->
        <div class="box">
            <h3>أضف بلاغ جديد</h3>
            <input type="text" id="name" placeholder="اسم الشخص">
            <input type="text" id="phone" placeholder="رقم الهاتف">
            <input type="text" id="wallet" placeholder="المحفظة أو الكلك (مثال: زين كاش)">
            <input type="text" id="socialLink" placeholder="رابط الحساب (فيسبوك/واتس)">
            <label>صورة الحساب:</label>
            <input type="file" id="personImg" accept="image/*">
            <textarea id="notes" placeholder="كيف نصب عليك؟ اكتب التفاصيل..."></textarea>
            <button onclick="saveData()">حفظ البلاغ</button>
        </div>

        <!-- قسم الأدمن -->
        <div class="box" style="margin-top: 50px;">
            <h3>لوحة التحكم (للأدمن)</h3>
            <input type="text" id="adminUser" placeholder="اسم المستخدم">
            <input type="password" id="adminPass" placeholder="كلمة السر">
            <button onclick="checkAdmin()" style="background:#dc3545;">دخول الأدمن</button>
        </div>
    </div>

    <footer style="margin-top: 30px; color: #666; font-size: 0.8em; text-align: center; padding-bottom: 20px;">
        <p>تم التصميم بواسطة بنات الاردن بزنس ©</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
