<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع كشف النصابين</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🔍 موقع كشف</h1>
        <p>البحث والتحذير من المحتالين.</p>
    </header>

    <div class="container">
        <div class="box">
            <h3>البحث عن نصاب</h3>
            <input type="text" id="searchPhone" placeholder="أدخل رقم الهاتف">
            <button onclick="searchData()" style="background:#28a745;">بحث</button>
            <div id="result"></div>
        </div>

        <button onclick="showReports()" style="background:#ffc107; color:#000;">عرض البلاغات الموثقة</button>
        <div id="reports-list" class="box" style="display:none;">
            <h3>قائمة البلاغات</h3>
            <div id="all-reports"></div>
            <button onclick="document.getElementById('reports-list').style.display='none'">إغلاق</button>
        </div>

        <div class="box">
            <h3>تقديم بلاغ جديد</h3>
            <input type="text" id="name" placeholder="اسم الشخص">
            <input type="text" id="phone" placeholder="رقم الهاتف">
            <textarea id="notes" placeholder="تفاصيل النصب..."></textarea>
            <button onclick="saveData()">إرسال للمراجعة</button>
        </div>

        <div class="box">
            <h3>لوحة تحكم الأدمن</h3>
            <input type="text" id="adminUser" placeholder="اسم المستخدم">
            <input type="password" id="adminPass" placeholder="كلمة السر">
            <button onclick="checkAdmin()" style="background:#dc3545;">دخول</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
